spring.application.name=portal-dashboard
server.port=9090

# --- Keycloak Configuration (Resource Server) ---
# Här ändrar vi till din publika HTTPS-adress och ser till att realm matchar
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm/protocol/openid-connect/certs

# --- OAuth2 Client Configuration ---
spring.security.oauth2.client.registration.keycloak.client-id=wigell-client
spring.security.oauth2.client.registration.keycloak.client-secret=RiR5Dmv1pNOgTVoVmdzi6TKe10ruhq0i
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# --- OAuth2 Provider Details ---
# Notera HTTPS på samtliga rader nedan
spring.security.oauth2.client.provider.keycloak.issuer-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm
spring.security.oauth2.client.provider.keycloak.authorization-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm/protocol/openid-connect/certs

# VG Logging: Log to file
logging.file.name=logs/portal-dashboard.log
logging.level.root=INFO