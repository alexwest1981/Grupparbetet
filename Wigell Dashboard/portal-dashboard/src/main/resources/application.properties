spring.application.name=portal-dashboard
server.port=9090

# Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/wigell-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/wigell-realm/protocol/openid-connect/certs

# OAuth2 Client (för att logga in på Dashboarden via webbläsare)
spring.security.oauth2.client.registration.keycloak.client-id=dashboard-client
spring.security.oauth2.client.registration.keycloak.client-secret=sBke16rRT0cv92SHN6mQgbUWCRIrjd1cr
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/wigell-realm
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:8080/realms/wigell-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8080/realms/wigell-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://localhost:8080/realms/wigell-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:8080/realms/wigell-realm/protocol/openid-connect/certs

# VG Logging: Log to file
logging.file.name=logs/portal-dashboard.log
logging.level.root=INFO
