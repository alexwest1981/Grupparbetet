spring.application.name=Wigell-Sushi-API
server.port=8582

# Databas (Behålls som den är för lokal databas)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/wigell_sushi_db?createDatabaseIfNotExist=true
spring.datasource.username=sushi_user
spring.datasource.password=password123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Kör data.sql för att uppfylla redovisningskravet (5 kunder, 5 rätter etc.) efter tabellerna skapats
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Keycloak (Styrs om till online-versionen)
# Viktigt: Se till att realm-namnet matchar det du har i Cloudflare
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm

# Spring Boot Admin Client (Koppling till din lokala Dashboard)
spring.boot.admin.client.url=http://localhost:9090
spring.boot.admin.client.instance.service-base-url=http://localhost:8582
spring.boot.admin.client.instance.name=Wigell-Sushi-API
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123

# Loggning
logging.file.name=logs/sushi-api.log
logging.level.com.wigell.sushi=INFO

# Actuator (Expose all for Dashboard)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always